<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Ribbescobb Labs</title>
    <meta name="description" content="Get in touch with Ribbescobb Labs.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0D0D;
            --surface: #141414;
            --border: #1E1E1E;
            --muted: #555;
            --text: #D4D0CB;
            --heading: #F0EDE8;
            --accent: #C8A55A;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            font-size: 17px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Nav ── */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(13,13,13,0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .nav-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--heading);
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        .nav-links {
            display: flex;
            gap: 28px;
        }
        .nav-links a {
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--text); }

        /* ── Content ── */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 32px 80px;
            text-align: center;
        }

        .label {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 700;
            color: var(--heading);
            line-height: 1.3;
            margin-bottom: 24px;
        }

        .email {
            font-size: 18px;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: opacity 0.2s;
        }
        .email:hover { opacity: 0.7; }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 40px 32px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 0.06em;
        }
        .footer a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer a:hover { color: var(--text); }

        @media (max-width: 600px) {
            .content { padding: 100px 24px 60px; }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="nav">
        <a href="/" class="nav-brand">Ribbescobb Labs</a>
        <div class="nav-links">
            <a href="https://thatstronk.com">STRONK</a>
            <a href="/etymology">The Word</a>
        </div>
    </nav>

    <!-- CONTENT -->
    <main class="content">
        <div class="label">Contact</div>
        <h1>Say hello.</h1>
        <a href="mailto:chris@ribbescobb.com" class="email">chris@ribbescobb.com</a>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        &copy; Ribbescobb Labs, LLC 2026
    </footer>

</body>
</html>
